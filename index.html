<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kole fortuny</title>
  <style>
    :root{
      --bg:#0f1020;
      --panel:#181b2f;
      --panel2:#202544;
      --text:#eef1ff;
      --muted:#a9b0d1;
      --accent:#7a78ff;
      --accent2:#ff6262;
      --line:#2c3156;
      --shadow:0 18px 45px rgba(0,0,0,.35);
      --radius:20px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:radial-gradient(circle at top, #171b38 0%, var(--bg) 58%);
      color:var(--text);
      min-height:100vh;
      overflow:hidden;
    }
    header{
      padding:18px 18px 10px;
      display:flex;
      justify-content:space-between;
      gap:14px;
      align-items:center;
      flex-wrap:wrap;
    }
    h1{
      margin:0;
      font-size:24px;
      letter-spacing:.2px;
    }
    .topbar{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }
    input, button{
      border:none;
      outline:none;
      border-radius:14px;
      font-size:15px;
    }
    input{
      background:#111533;
      color:var(--text);
      border:1px solid var(--line);
      padding:12px 14px;
    }
    button{
      background:linear-gradient(135deg, var(--accent), #8e5cff);
      color:white;
      padding:12px 16px;
      cursor:pointer;
      box-shadow:var(--shadow);
    }
    button.secondary{background:#2a315f}
    button.danger{background:linear-gradient(135deg, #ff7a7a, #ff4d4d)}

    .layout{
      height:calc(100vh - 80px);
      padding:10px 18px 18px;
      display:grid;
      grid-template-rows:auto 1fr;
      gap:12px;
    }

    .card{
      background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.02));
      border:1px solid rgba(255,255,255,.08);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      overflow:hidden;
      display:grid;
      grid-template-rows:auto auto 1fr auto;
      min-height:0;
    }
    .cardHead{
      padding:16px 18px 12px;
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:center;
      background:rgba(0,0,0,.10);
      border-bottom:1px solid rgba(255,255,255,.06);
    }
    .cardHead h2{
      margin:0;
      font-size:22px;
    }
    .meta{
      color:var(--muted);
      font-size:14px;
    }
    .controls{
      padding:16px 18px;
      display:grid;
      gap:12px;
      grid-template-columns:repeat(4,minmax(0,1fr));
      border-bottom:1px solid rgba(255,255,255,.06);
      background:rgba(0,0,0,.06);
    }
    .controls .full{grid-column:1/-1}
    .controls label{
      display:block;
      font-size:13px;
      color:var(--muted);
      margin-bottom:6px;
    }
    .controls input{width:100%}

    .mainArea{
      min-height:0;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:18px;
    }

    .wheelLayout{
      width:min(1200px, 100%);
      display:grid;
      grid-template-columns:minmax(420px, 1fr) 360px;
      gap:18px;
      align-items:start;
    }

    .wheelBox{
      width:100%;
      aspect-ratio:1;
      display:grid;
      place-items:center;
      position:relative;
      background:var(--panel);
      border:1px solid rgba(255,255,255,.06);
      border-radius:24px;
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.03);
    }
    .pointer{
      position:absolute;
      top:18px;
      left:50%;
      transform:translateX(-50%);
      width:0;height:0;
      border-left:16px solid transparent;
      border-right:16px solid transparent;
      border-top:28px solid #ffd54a;
      filter:drop-shadow(0 4px 6px rgba(0,0,0,.35));
      z-index:4;
    }
    .wheel{
      width:min(380px, 76%);
      aspect-ratio:1;
      border-radius:50%;
      border:12px solid #0d1020;
      box-shadow:inset 0 0 0 2px rgba(255,255,255,.08), 0 16px 40px rgba(0,0,0,.45);
      transition:transform 4s cubic-bezier(.12,.82,.12,1);
      position:relative;
      overflow:hidden;
      background:repeating-conic-gradient(#f3f4f8 0deg 10deg, #d9deec 10deg 20deg);
    }
    .wheelText{
      position:absolute;
      inset:0;
      border-radius:50%;
      pointer-events:none;
    }
    .sliceLabel{
      position:absolute;
      left:50%;
      top:50%;
      transform-origin:center;
      color:#101322;
      font-weight:800;
      font-size:18px;
      text-shadow:0 1px 0 rgba(255,255,255,.5);
      white-space:nowrap;
    }
    .centerDot{
      position:absolute;
      left:50%;
      top:50%;
      width:28px;
      height:28px;
      transform:translate(-50%,-50%);
      background:#fff;
      border-radius:50%;
      border:6px solid #111;
      z-index:5;
      pointer-events:none;
    }

    .sidePanel{
      background:var(--panel);
      border:1px solid rgba(255,255,255,.06);
      border-radius:20px;
      padding:18px;
      display:flex;
      flex-direction:column;
      gap:14px;
      height:100%;
      min-height:560px;
    }
    .resultTitle{font-size:18px;color:var(--muted)}
    .resultValue{
      font-size:42px;
      font-weight:800;
      color:#fff;
    }
    .small{font-size:13px;color:var(--muted)}
    .navRow{display:flex;gap:10px;flex-wrap:wrap}
    .historyList{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      min-height:42px;
      align-content:flex-start;
      max-height:320px;
      overflow:auto;
    }
    .historyItem{
      padding:6px 10px;
      background:#2a315f;
      border-radius:999px;
      color:#fff;
      font-weight:700;
      font-size:14px;
    }

    .footer{
      padding:14px 18px 18px;
      border-top:1px solid rgba(255,255,255,.06);
      background:rgba(0,0,0,.06);
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:center;
      flex-wrap:wrap;
    }
    .empty{
      display:flex;
      align-items:center;
      justify-content:center;
      height:100%;
      text-align:center;
      color:var(--muted);
      font-size:18px;
      padding:30px;
    }

    @media (max-width:1100px){
      .wheelLayout{
        grid-template-columns:1fr;
      }
      .sidePanel{
        min-height:auto;
      }
    }

    @media (max-width:900px){
      .controls{grid-template-columns:repeat(2,minmax(0,1fr))}
    }
  </style>
</head>
<body>
  <header>
    <h1>Kole fortuny</h1>
    <div class="topbar">
      <input id="catName" placeholder="Nazwa kategorii" />
      <input id="catCount" type="number" min="1" max="100" placeholder="Liczba pól" style="width:140px" />
      <button id="addCat">Dodaj kategorię</button>
      <button id="clearAll" class="danger">Wyczyść wszystko</button>
    </div>
  </header>

  <div class="layout">
    <div id="content"></div>
  </div>

  <script>
    const content = document.getElementById('content');
    const catName = document.getElementById('catName');
    const catCount = document.getElementById('catCount');
    const addCat = document.getElementById('addCat');
    const clearAll = document.getElementById('clearAll');

    let data = JSON.parse(localStorage.getItem('wheel_tabs_v1') || '[]');
    let active = 0;

    function save() {
      localStorage.setItem('wheel_tabs_v1', JSON.stringify(data));
    }

    function makeSegments(n) {
      return Array.from({length:n}, () => ({ used:false }));
    }

    function render() {
      if (!data.length) {
        content.innerHTML = `<div class="empty">Dodaj kategorię z liczbą pól. Potem przełączaj się przyciskami poprzednia / następna karta.</div>`;
        return;
      }

      const cat = data[active];
      if (!cat.segments) cat.segments = makeSegments(1);
      if (typeof cat.rotation !== 'number') cat.rotation = 0;
      if (!cat.result) cat.result = '';
      if (!cat.history) cat.history = [];

      content.innerHTML = `
        <section class="card">
          <div class="cardHead">
            <div>
              <h2>${escapeHtml(cat.name)}</h2>
              <div class="meta">Kategoria ${active + 1} z ${data.length}</div>
            </div>
            <div class="navRow">
              <button class="secondary" id="prevTab">Poprzednia karta</button>
              <button class="secondary" id="nextTab">Następna karta</button>
            </div>
          </div>

          <div class="controls">
            <div>
              <label>Liczba pól</label>
              <input id="countInput" type="number" min="1" max="100" value="${cat.segments.length}" />
            </div>
            <div>
              <label>Generowanie</label>
              <button class="secondary" id="applyCount" style="width:100%">Utwórz pola</button>
            </div>
            <div>
              <label>Reset</label>
              <button class="secondary" id="resetUsed" style="width:100%">Przywróć wszystkie</button>
            </div>
            <div>
              <label>Usuń kategorię</label>
              <button class="danger" id="deleteCat" style="width:100%">Usuń</button>
            </div>
            <div class="full">
              <label>Kliknij w koło, żeby losować. Wylosowane pole znika z kolejnych losowań.</label>
            </div>
          </div>

          <div class="mainArea">
            <div class="wheelLayout">
              <div class="wheelBox">
                <div class="pointer"></div>
                <div class="wheel" id="wheel">
                  <div class="wheelText" id="wheelText"></div>
                </div>
                <div class="centerDot"></div>
              </div>

              <div class="sidePanel">
                <div class="resultTitle">Wylosowany numer</div>
                <div class="resultValue">${cat.result || '—'}</div>
                <div class="small">Jeśli wszystkie numery znikną, zrób reset.</div>

                <div class="navRow">
                  <button id="spin">Losuj</button>
                  <button class="secondary" id="refresh">Odśwież</button>
                </div>

                <div class="resultTitle" style="margin-top:6px;">Historia</div>
                <div class="historyList" id="historyList"></div>
              </div>
            </div>
          </div>

          <div class="footer">
            <div class="small">Układ jest statyczny: koło po lewej, wynik i historia po prawej.</div>
            <div class="navRow">
              <button class="secondary" id="prevTab2">Poprzednia karta</button>
              <button class="secondary" id="nextTab2">Następna karta</button>
            </div>
          </div>
        </section>
      `;

      const wheel = document.getElementById('wheel');
      const wheelText = document.getElementById('wheelText');
      const countInput = document.getElementById('countInput');
      const historyList = document.getElementById('historyList');

      wheel.style.background = wheelStyle(cat.segments);
      wheel.style.cursor = 'pointer';
      drawNumbers(wheelText, cat.segments);
      renderHistory(historyList, cat.history);

      const goPrev = () => {
        if (!data.length) return;
        active = (active - 1 + data.length) % data.length;
        render();
      };
      const goNext = () => {
        if (!data.length) return;
        active = (active + 1) % data.length;
        render();
      };

      const spin = () => {
        const activeIdx = cat.segments.map((s, i) => s.used ? -1 : i).filter(i => i >= 0);
        if (!activeIdx.length) {
          cat.result = 'Brak aktywnych pól';
          save();
          render();
          return;
        }
        const pick = activeIdx[Math.floor(Math.random() * activeIdx.length)];
        cat.segments[pick].used = true;
        cat.result = String(pick + 1);
        cat.history.unshift(String(pick + 1));
        if (cat.history.length > 50) cat.history.pop();
        cat.rotation = (cat.rotation || 0) + 720 + Math.floor(Math.random() * 360);
        wheel.style.transform = `rotate(${cat.rotation}deg)`;
        save();
        setTimeout(() => render(), 1400);
      };

      document.getElementById('applyCount').addEventListener('click', () => {
        const n = Math.max(1, Math.min(100, parseInt(countInput.value || '1', 10)));
        cat.segments = makeSegments(n);
        cat.result = '';
        cat.history = [];
        save();
        render();
      });

      document.getElementById('resetUsed').addEventListener('click', () => {
        cat.segments.forEach(s => s.used = false);
        cat.result = '';
        cat.history = [];
        save();
        render();
      });

      document.getElementById('deleteCat').addEventListener('click', () => {
        data.splice(active, 1);
        if (active >= data.length) active = Math.max(0, data.length - 1);
        save();
        render();
      });

      document.getElementById('spin').addEventListener('click', spin);
      wheel.addEventListener('click', spin);

      document.getElementById('refresh').addEventListener('click', () => {
        wheel.style.background = wheelStyle(cat.segments);
        drawNumbers(wheelText, cat.segments);
        renderHistory(historyList, cat.history);
      });

      document.getElementById('prevTab').addEventListener('click', goPrev);
      document.getElementById('nextTab').addEventListener('click', goNext);
      document.getElementById('prevTab2').addEventListener('click', goPrev);
      document.getElementById('nextTab2').addEventListener('click', goNext);
    }

    function wheelStyle(segments) {
      const activeCount = segments.filter(s => !s.used).length;
      if (activeCount <= 0) return 'radial-gradient(circle at center, #777 0%, #444 100%)';
      const step = 360 / activeCount;
      return `repeating-conic-gradient(#f3f4f8 0deg ${step/2}deg, #d9deec ${step/2}deg ${step}deg)`;
    }

    function drawNumbers(container, segments) {
      container.innerHTML = '';
      const activeSegments = segments
        .map((s, i) => ({ ...s, index: i }))
        .filter(s => !s.used);
      const n = activeSegments.length;
      if (!n) return;
      const radius = 35;
      const fontSize = Math.max(9, Math.min(22, 350 / n));
      activeSegments.forEach((seg, i) => {
        const angle = (360 / n) * i - 90 + (180 / n);
        const x = 50 + Math.cos(angle * Math.PI / 180) * radius;
        const y = 50 + Math.sin(angle * Math.PI / 180) * radius;
        const label = document.createElement('div');
        label.className = 'sliceLabel';
        label.textContent = seg.index + 1;
        label.style.left = x + '%';
        label.style.top = y + '%';
        label.style.fontSize = fontSize + 'px';
        label.style.transform = `translate(-50%, -50%) rotate(${angle + 90}deg)`;
        container.appendChild(label);
      });
    }

    function renderHistory(container, history) {
      container.innerHTML = history.length
        ? history.map(n => `<span class="historyItem">${escapeHtml(n)}</span>`).join('')
        : '<span class="small">Brak losowań</span>';
    }

    function escapeHtml(s) {
      return String(s || '')
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;');
    }

    addCat.addEventListener('click', () => {
      const name = catName.value.trim();
      const count = Math.max(1, Math.min(100, parseInt(catCount.value || '1', 10)));
      if (!name) return;
      data.push({
        name,
        segments: makeSegments(count),
        rotation: 0,
        result: '',
        history: []
      });
      active = data.length - 1;
      catName.value = '';
      catCount.value = '';
      save();
      render();
    });

    catName.addEventListener('keydown', e => {
      if (e.key === 'Enter') addCat.click();
    });
    catCount.addEventListener('keydown', e => {
      if (e.key === 'Enter') addCat.click();
    });

    clearAll.addEventListener('click', () => {
      if (!confirm('Usunąć wszystkie kategorie?')) return;
      data = [];
      active = 0;
      save();
      render();
    });

    render();
  </script>
</body>
</html>
